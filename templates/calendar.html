{% extends "base.html" %}
{% block title %}Calendar — ExamTrack AI{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>📅 Calendar View</h1>
        <p class="subtitle">Visualize your exam schedule</p>
    </div>
</div>

<div class="card" style="padding: 24px;">
    <div class="calendar-header">
        <div class="calendar-nav">
            <button onclick="calendarView.prevMonth()" aria-label="Previous month">◀</button>
        </div>
        <h2 id="calendarTitle">Loading...</h2>
        <div class="calendar-nav">
            <button onclick="calendarView.nextMonth()" aria-label="Next month">▶</button>
        </div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <div class="calendar-day-header">Sun</div>
        <div class="calendar-day-header">Mon</div>
        <div class="calendar-day-header">Tue</div>
        <div class="calendar-day-header">Wed</div>
        <div class="calendar-day-header">Thu</div>
        <div class="calendar-day-header">Fri</div>
        <div class="calendar-day-header">Sat</div>
    </div>
</div>

<!-- Exam Detail Modal (reused from click) -->
<div class="modal-overlay" id="dayModal">
    <div class="modal" style="max-width: 450px;">
        <div class="modal-header">
            <h2 id="dayModalTitle">📅 Exams on this day</h2>
            <button class="modal-close" onclick="document.getElementById('dayModal').classList.remove('active')">✕</button>
        </div>
        <div id="dayModalContent">
            <!-- Filled by JS -->
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/calendar.js') }}"></script>
<script>
    const calendarView = new CalendarView();
    document.addEventListener('DOMContentLoaded', () => calendarView.init());
</script>
{% endblock %}
